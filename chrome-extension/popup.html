<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome-WhisperX</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <h1>Chrome-WhisperX</h1>
        
        <div class="settings">
            <h3>API Server Settings</h3>
            <div class="form-group">
                <label for="serverUrl">Server URL:</label>
                <input type="text" id="serverUrl" placeholder="http://localhost:8000" />
            </div>
            <div class="form-group">
                <label for="sourceLanguage">Source Language:</label>
                <select id="sourceLanguage">
                    <option value="">Auto-detect</option>
                    <option value="en">English</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="es">Spanish</option>
                    <option value="it">Italian</option>
                    <option value="ja">Japanese</option>
                    <option value="ko">Korean</option>
                    <option value="zh">Chinese</option>
                    <option value="pt">Portuguese</option>
                    <option value="nl">Dutch</option>
                    <option value="uk">Ukrainian</option>
                    <option value="pl">Polish</option>
                    <option value="ar">Arabic</option>
                    <option value="ru">Russian</option>
                    <option value="cs">Czech</option>
                    <option value="tr">Turkish</option>
                    <option value="vi">Vietnamese</option>
                    <option value="sv">Swedish</option>
                    <option value="hi">Hindi</option>
                    <option value="ca">Catalan</option>
                    <option value="fi">Finnish</option>
                    <option value="no">Norwegian</option>
                    <option value="th">Thai</option>
                    <option value="id">Indonesian</option>
                    <option value="he">Hebrew</option>
                    <option value="fa">Persian</option>
                    <option value="el">Greek</option>
                    <option value="hu">Hungarian</option>
                    <option value="ro">Romanian</option>
                    <option value="da">Danish</option>
                    <option value="ta">Tamil</option>
                    <option value="ur">Urdu</option>
                </select>
                <small>Select for faster processing (skips auto-detection)</small>
            </div>
            <div class="form-group">
                <label for="targetLanguage">Target Language:</label>
                <input type="text" id="targetLanguage" placeholder="English" />
            </div>
            
            <h3>Performance</h3>
            <div class="form-group">
                <label for="chunkDuration">Chunk Duration (seconds):</label>
                <input type="number" id="chunkDuration" min="1" max="15" value="1" />
                <small>Shorter = faster updates, Longer = better context</small>
            </div>
            <button id="saveSettings">Save Settings</button>
        </div>

        <div class="controls">
            <h3>Audio Capture</h3>
            <div class="status">
                <span id="statusText">Ready</span>
            </div>
            <button id="startCapture" class="btn-primary">Start Capture</button>
            <button id="stopCapture" class="btn-secondary" disabled>Stop Capture</button>
        </div>

        <div class="translation">
            <h3>Translation <button id="popOutWindow" class="btn-secondary" style="float: right; padding: 5px 10px; font-size: 12px;">Pop Out</button></h3>
            <div id="translationOutput" class="output-box">
                Translations will appear here...
            </div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
